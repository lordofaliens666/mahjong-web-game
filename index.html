<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jade Parlour — Play Mahjong Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .hero { display: flex; min-height: calc(100vh - 64px); }
  .hero-copy {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    padding: 0 60px; gap: 22px; max-width: 640px;
  }
  .hero-eyebrow { font-size: 11px; letter-spacing: .24em; color: var(--brown); text-transform: uppercase; }
  .hero-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 56px; color: var(--ink); line-height: 1.05; margin: 0; }
  .hero-desc { font-size: 15px; color: #4a4030; max-width: 380px; line-height: 1.6; }
  .hero-cta { display: flex; gap: 14px; margin-top: 6px; flex-wrap: wrap; }
  .hero-art {
    flex: 1; position: relative;
    background: radial-gradient(120% 100% at 70% 50%, #7c8850, #4f5738);
    display: flex; align-items: center; justify-content: center; min-height: 360px;
  }
  .hero-tiles { display: grid; grid-template-columns: repeat(4, 64px); gap: 8px; transform: rotate(-8deg); }
  @media (max-width: 900px) {
    .hero { flex-direction: column; }
    .hero-copy { padding: 48px 32px; max-width: none; }
    .hero-title { font-size: 40px; }
  }
</style>
</head>
<body>

<div class="nav">
  <a class="nav-brand nav-name" href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:10px">
    <div class="nav-mark">雀</div>
    <span class="nav-name">Jade Parlour</span>
  </a>
  <div class="nav-links">
    <a href="lobby.html" class="active">Play</a>
    <a href="#rules">Rules</a>
  </div>
  <div class="nav-avatar"></div>
</div>

<div class="hero">
  <div class="hero-copy">
    <div class="hero-eyebrow">Singapore Mahjong · Online</div>
    <h1 class="hero-title">Play mahjong<br>with soul.</h1>
    <div class="hero-desc">Real-time-feeling tables, classic tai scoring, and a parlour that feels like home. Play a full hand against three AI opponents right in your browser.</div>
    <div class="hero-cta">
      <a href="lobby.html?mode=quick" class="btn btn-primary">Quick Match</a>
      <a href="lobby.html" class="btn btn-outline">Private Table</a>
    </div>
  </div>
  <div class="hero-art">
    <div class="hero-tiles" id="hero-tiles"></div>
  </div>
</div>

<script type="module">
  import { createTileElement } from './js/tiles.js';
  const spec = [
    { kind: 'dot', n: 1 }, { kind: 'dot', n: 2 }, { kind: 'bam', n: 3 }, { kind: 'char', n: 4 },
    { kind: 'wind', label: '南' }, { kind: 'dragon', label: '發' }, { kind: 'dot', n: 9 }, { kind: 'flower', n: 1 },
  ];
  const wrap = document.getElementById('hero-tiles');
  for (const t of spec) wrap.appendChild(createTileElement(t, { w: 64, h: 86 }));
</script>
</body>
</html>
